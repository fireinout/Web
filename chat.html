<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時聊天 - Kekeke Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 左側聊天面板 */
        .chat-panel {
            flex: 0 0 50%;
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .message.other .message-content {
            background: #e0e0e0;
            color: #000;
            text-align: left;
        }

        .message.own .message-content {
            background: #667eea;
            color: white;
            text-align: left;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .text-link {
            color: #667eea;
            text-decoration: underline;
            cursor: pointer;
            word-break: break-all;
        }

        .text-link:hover {
            color: #764ba2;
        }

        /* 聊天輸入區 */
        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        #imageInput, #videoInput {
            display: none;
        }

        .file-button {
            padding: 10px 15px;
            background: #ff9800;
        }

        .file-button:hover {
            background: #e68900;
        }

        .clear-button {
            background: #f44336;
        }

        .clear-button:hover {
            background: #d32f2f;
        }

        /* 右側媒體預覽 */
        .media-panel {
            flex: 0 0 50%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .media-header {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            color: white;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        .media-content {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        .media-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .media-video {
            width: 90%;
            max-height: 90%;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .no-media {
            color: #999;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .chat-panel, .media-panel {
                flex: 1;
            }

            .chat-panel {
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左側聊天面板 -->
        <div class="chat-panel">
            <div class="chat-header">Kekeke Chat 即時聊天</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="輸入訊息..."
                        autocomplete="off"
                    >
                    <button onclick="sendMessage()">發送</button>
                </div>
                <div class="input-buttons">
                    <button class="file-button" onclick="document.getElementById('imageInput').click()">📷 圖片</button>
                    <button class="file-button" onclick="document.getElementById('videoInput').click()">🎬 上傳影片</button>
                    <button class="clear-button" onclick="clearChat()">🗑️ 清空</button>
                </div>
                <input type="file" id="imageInput" accept="image/*">
                <input type="file" id="videoInput" accept="video/*">
            </div>
        </div>

        <!-- 右側媒體預覽 -->
        <div class="media-panel">
            <div class="media-header">媒體預覽</div>
            <div class="media-content" id="mediaContent">
                <div class="no-media">👈 在左邊輸入訊息或上傳圖片</div>
            </div>
        </div>
    </div>

    <script>
        // 聊天數據存儲
        const DB_NAME = 'ChatDB';
        const STORE_NAME = 'messages';
        let db;

        // 初始化 IndexedDB
        function initDatabase() {
            const request = indexedDB.open(DB_NAME, 1);
            
            request.onerror = () => console.error('數據庫初始化失敗');
            request.onsuccess = (event) => {
                db = event.target.result;
                loadMessages();
            };
            
            request.onupgradeneeded = (event) => {
                const store = event.target.result.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                store.createIndex('timestamp', 'timestamp', { unique: false });
            };
        }

        // 保存消息
        function saveMessage(message) {
            if (!db) return;
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.add(message);
        }

        // 加載消息
        function loadMessages() {
            if (!db) return;
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            
            request.onsuccess = () => {
                const messages = request.result;
                const messagesDiv = document.getElementById('chatMessages');
                messagesDiv.innerHTML = '';
                messages.forEach(msg => displayMessage(msg, false));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            };
        }

        // 清空聊天
        function clearChat() {
            if (confirm('確定要清空所有聊天記錄嗎？')) {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.clear();
                document.getElementById('chatMessages').innerHTML = '';
                clearMediaPanel();
            }
        }

        // 發送文本消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            // 檢測URL
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const urls = text.match(urlRegex);
            
            const message = {
                type: 'text',
                content: text,
                urls: urls || [],
                timestamp: new Date(),
                own: true
            };
            
            saveMessage(message);
            displayMessage(message, true);
            input.value = '';
            input.focus();
            
            // 廣播到其他標籤頁
            broadcastMessage(message);
        }

        // 文件上傳處理
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const message = {
                        type: 'image',
                        content: event.target.result,
                        timestamp: new Date(),
                        own: true
                    };
                    saveMessage(message);
                    displayMessage(message, true);
                    previewImage(event.target.result);
                    broadcastMessage(message);
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        document.getElementById('videoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const message = {
                        type: 'video',
                        content: event.target.result,
                        name: file.name,
                        timestamp: new Date(),
                        own: true
                    };
                    saveMessage(message);
                    displayMessage(message, true);
                    previewVideo(event.target.result);
                    broadcastMessage(message);
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        // 顯示消息
        function displayMessage(message, scroll = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${message.own ? 'own' : 'other'}`;
            
            let html = '';
            
            if (message.type === 'text') {
                // 將URL轉換為可點擊的鏈接
                let content = escapeHtml(message.content);
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                content = content.replace(urlRegex, (url) => {
                    return `<a href="#" class="text-link" onclick="previewUrl('${url.replace(/'/g, "\\'")}'); return false;">${url}</a>`;
                });
                html = `
                    <div class="message-content">${content}</div>
                    <div class="message-time">${formatTime(new Date(message.timestamp))}</div>
                `;
            } else if (message.type === 'image') {
                html = `
                    <div class="message-content">
                        <img src="${message.content}" class="message-image" onclick="previewImage('${message.content.replace(/'/g, "\\'")}')" style="cursor: pointer;">
                    </div>
                    <div class="message-time">${formatTime(new Date(message.timestamp))}</div>
                `;
            } else if (message.type === 'video') {
                html = `
                    <div class="message-content">
                        <p>📹 影片：${escapeHtml(message.name)}</p>
                    </div>
                    <div class="message-time">${formatTime(new Date(message.timestamp))}</div>
                `;
            }
            
            messageEl.innerHTML = html;
            messagesDiv.appendChild(messageEl);
            
            if (scroll) {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        // 預覽URL (自動識別類型)
        function previewUrl(url) {
            const mediaContent = document.getElementById('mediaContent');
            
            // 檢測 YouTube
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const videoId = extractYouTubeId(url);
                if (videoId) {
                    mediaContent.innerHTML = `<iframe width="90%" height="90%" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    mediaContent.innerHTML = `<div class="no-media">無法解析視頻連結</div>`;
                }
            }
            // 檢測圖片URL
            else if (/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(url)) {
                mediaContent.innerHTML = `<img src="${url}" class="media-image" alt="preview" onerror="this.parentElement.innerHTML='<div class=&quot;no-media&quot;>❌ 無法載入圖片</div>'">`;
            }
            // 檢測視頻URL
            else if (/\.(mp4|webm|ogg|mov|avi)$/i.test(url)) {
                mediaContent.innerHTML = `<video src="${url}" class="media-video" controls onerror="this.parentElement.innerHTML='<div class=&quot;no-media&quot;>❌ 無法載入影片</div>'"></video>`;
            }
            // 其他網址
            else {
                mediaContent.innerHTML = `<div class="no-media">📎 連結：<br><a href="${escapeHtml(url)}" target="_blank" style="color: #667eea;">${url}</a></div>`;
            }
        }

        // 預覽圖片
        function previewImage(src) {
            const mediaContent = document.getElementById('mediaContent');
            mediaContent.innerHTML = `<img src="${src}" class="media-image" alt="preview">`;
        }

        // 預覽影片
        function previewVideo(src) {
            const mediaContent = document.getElementById('mediaContent');
            mediaContent.innerHTML = `<video src="${src}" class="media-video" controls></video>`;
        }

        // 提取 YouTube 視頻 ID
        function extractYouTubeId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/,
            ];
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // 清空媒體面板
        function clearMediaPanel() {
            document.getElementById('mediaContent').innerHTML = '<div class="no-media">👈 在左邊上傳圖片或分享影片連結</div>';
        }

        // 廣播消息到其他標籤頁
        function broadcastMessage(message) {
            try {
                const channel = new BroadcastChannel('chat_channel');
                channel.postMessage(message);
                channel.close();
            } catch (e) {
                console.log('BroadcastChannel 不支持');
            }
        }

        // 監聽其他標籤頁的消息
        try {
            const channel = new BroadcastChannel('chat_channel');
            channel.onmessage = (event) => {
                const message = event.data;
                // 只顯示來自其他標籤頁的消息，不顯示自己的消息
                if (!message.own) {
                    message.own = false;
                    displayMessage(message, true);
                }
            };
        } catch (e) {
            console.log('BroadcastChannel 不支持');
        }

        // 工具函數
        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 支持 Enter 發送消息
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始化
        initDatabase();
    </script>
</body>
</html>
